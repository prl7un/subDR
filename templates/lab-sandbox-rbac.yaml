{{- if .Values.dr_active }}
# k8s 랩의 "실제 실행 기반 검증"이 학생이 입력한 kubectl 명령을 실행할 때 쓰는 격리 공간.
# 최소 권한 원칙: dr-tutor-app 서비스어카운트는 lab-sandbox 네임스페이스 안의 파드/서비스/
# 디플로이먼트만 쓰고 지울 수 있고, 클러스터 범위에서는 노드 조회(읽기전용)만 가능하다.
# 그 외 네임스페이스(default, argocd, kube-system 등)에는 아무 권한이 없다.
apiVersion: v1
kind: Namespace
metadata:
  name: lab-sandbox
  labels:
    app.kubernetes.io/part-of: subdr
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dr-tutor-app
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dr-tutor-lab-sandbox
  namespace: lab-sandbox
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dr-tutor-lab-sandbox
  namespace: lab-sandbox
subjects:
  - kind: ServiceAccount
    name: dr-tutor-app
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: dr-tutor-lab-sandbox
  apiGroup: rbac.authorization.k8s.io
---
# kubectl get nodes / kubectl wait --for=condition=Ready node 는 클러스터 범위 리소스라
# 네임스페이스 Role로는 권한을 줄 수 없다. 읽기 전용으로만 클러스터 전체에 허용한다.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dr-tutor-nodes-read
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dr-tutor-nodes-read
subjects:
  - kind: ServiceAccount
    name: dr-tutor-app
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: dr-tutor-nodes-read
  apiGroup: rbac.authorization.k8s.io
{{- end }}
